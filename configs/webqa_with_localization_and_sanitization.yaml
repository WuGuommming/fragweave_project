    dtype: auto
    device_map: auto
    max_new_tokens: 512
    temperature: 0.0
    top_p: 1.0
  sharder:
    name_or_path: Qwen/Qwen2.5-7B-Instruct
    dtype: auto
    device_map: auto
    max_new_tokens: 256
    temperature: 0.0
    top_p: 1.0
  weaver:
    name_or_path: Qwen/Qwen2.5-7B-Instruct
    dtype: auto
    device_map: auto
    max_new_tokens: 256
    temperature: 0.0
    top_p: 1.0
  judge:
    name_or_path: Qwen/Qwen2.5-7B-Instruct
    dtype: auto
